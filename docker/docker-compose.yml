# Local development stack scaffold.
# Brings up PostgreSQL, Redis, MinIO, backend, and web services for Phase 0.
# Keep ports localhost-bound in local mode and evolve this file additively.

name: nextgenchat

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: nextgenchat
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d nextgenchat"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - redis-data:/data

  minio:
    image: minio/minio:RELEASE.2025-02-07T23-21-09Z
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 15s
      timeout: 10s
      retries: 10
    volumes:
      - minio-data:/data

  minio-init:
    image: minio/mc:RELEASE.2025-05-21T01-59-54Z
    depends_on:
      minio:
        condition: service_started
    entrypoint: >-
      /bin/sh -c
      "until mc alias set local http://minio:9000 minioadmin minioadmin123; do sleep 2; done &&
      mc mb --ignore-existing local/nextgenchat"

  backend:
    image: node:22-alpine
    restart: unless-stopped
    working_dir: /workspace
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    command: >-
      sh -c "corepack enable && pnpm install &&
      pnpm --filter @nextgenchat/backend dev"
    environment:
      NODE_ENV: development
      DEPLOYMENT_MODE: local
      PORT: 3001
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/nextgenchat?schema=public
      REDIS_URL: redis://redis:6379
      JWT_SECRET: local-dev-access-secret
      JWT_REFRESH_SECRET: local-dev-refresh-secret
      ENCRYPTION_KEY: local-dev-encryption-key-32-bytes
      CORS_ORIGINS: http://localhost:3000
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_USE_SSL: false
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin123
      MINIO_BUCKET: nextgenchat
    ports:
      - "127.0.0.1:3001:3001"
    volumes:
      - ..:/workspace

  web:
    image: node:22-alpine
    restart: unless-stopped
    working_dir: /workspace
    depends_on:
      backend:
        condition: service_started
    command: >-
      sh -c "corepack enable && pnpm install &&
      pnpm --filter @nextgenchat/web dev"
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_API_URL: http://localhost:3001
      NEXT_PUBLIC_SOCKET_URL: http://localhost:3001
    ports:
      - "127.0.0.1:3000:3000"
    volumes:
      - ..:/workspace

volumes:
  postgres-data:
  redis-data:
  minio-data:
