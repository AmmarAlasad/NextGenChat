# Test infrastructure scaffold.
# Provides isolated Postgres, Redis, and MinIO services for future automated tests.
# Expand this file when backend integration and end-to-end suites are added.

name: nextgenchat-test

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: nextgenchat_test
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "127.0.0.1:5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d nextgenchat_test"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "127.0.0.1:6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:RELEASE.2025-02-07T23-21-09Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    ports:
      - "127.0.0.1:9010:9000"
      - "127.0.0.1:9011:9001"
