<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "primary": "#0E4D4D",
                    "primary-dim": "#0a3a3a",
                    "on-primary": "#FFFFFF",
                    "background": "#F9FAFA",
                    "surface": "#FFFFFF",
                    "surface-container": "#F1F3F3",
                    "surface-container-low": "#F7F8F8",
                    "surface-container-high": "#E8EBEB",
                    "on-surface": "#1A1C1C",
                    "on-surface-variant": "#404949",
                    "outline": "#BEC8C8",
                    "outline-variant": "#DAE4E4"
            },
            "borderRadius": {
                    "DEFAULT": "0.75rem",
                    "lg": "1rem",
                    "xl": "1.25rem",
                    "full": "9999px"
            },
            "fontFamily": {
                    "headline": ["Manrope", "sans-serif"],
                    "body": ["Manrope", "sans-serif"],
                    "label": ["Manrope", "sans-serif"]
            }
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            vertical-align: middle;
        }
        .scale-98-active:active { transform: scale(0.98); }
        .bg-mesh {
            background-color: #F9FAFA;
            background-image: 
                radial-gradient(at 0% 0%, rgba(14, 77, 77, 0.03) 0px, transparent 50%),
                radial-gradient(at 100% 0%, rgba(14, 77, 77, 0.02) 0px, transparent 50%);
        }
        .technical-card {
            box-shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.02), 0 1px 2px -1px rgba(0, 0, 0, 0.02);
        }
    </style>
</head>
<body class="bg-mesh text-on-surface font-body selection:bg-primary/10 selection:text-primary">
<main class="min-h-screen flex items-center justify-center p-6 sm:p-12">
<div class="w-full max-w-xl">
<!-- Header Section -->
<header class="text-center mb-10">
<div class="inline-flex items-center justify-center p-3.5 rounded-xl bg-surface-container-high mb-6 border border-outline-variant/30">
<span class="material-symbols-outlined text-primary text-3xl" data-icon="terminal">terminal</span>
</div>
<h1 class="font-headline font-extrabold text-3xl tracking-tight text-on-surface mb-3">NextGenChat</h1>
<p class="text-on-surface-variant font-medium text-base max-w-sm mx-auto leading-relaxed">
            NextGenChat is a local-first AI workspace. Your data and conversations stay on your machine.
        </p>
</header>
<!-- Configuration Card -->
<div class="bg-surface rounded-xl p-8 sm:p-10 border border-outline-variant/40 technical-card relative overflow-hidden">
<div class="absolute top-0 left-0 right-0 h-1 bg-primary"></div>
<form class="space-y-8">
<!-- User Credentials Section -->
<section class="space-y-4">
<div class="flex items-center gap-2 mb-2">
<span class="material-symbols-outlined text-primary/70 text-lg" data-icon="account_circle">account_circle</span>
<h2 class="font-headline font-bold text-on-surface-variant text-xs uppercase tracking-[0.15em]">User Account</h2>
</div>
<div class="space-y-4">
<div class="grid gap-1.5">
<label class="text-xs font-bold text-on-surface-variant/80 px-1" for="username">Username</label>
<input class="w-full bg-surface-container-low border border-outline-variant/50 rounded-lg px-4 py-2.5 focus:ring-2 focus:ring-primary/10 focus:border-primary placeholder:text-outline/70 transition-all font-medium text-sm" id="username" placeholder="curator_01" type="text"/>
</div>
<div class="grid sm:grid-cols-2 gap-4">
<div class="grid gap-1.5">
<label class="text-xs font-bold text-on-surface-variant/80 px-1" for="password">Password</label>
<input class="w-full bg-surface-container-low border border-outline-variant/50 rounded-lg px-4 py-2.5 focus:ring-2 focus:ring-primary/10 focus:border-primary transition-all font-medium text-sm" id="password" placeholder="••••••••" type="password"/>
</div>
<div class="grid gap-1.5">
<label class="text-xs font-bold text-on-surface-variant/80 px-1" for="confirm-password">Confirm Password</label>
<input class="w-full bg-surface-container-low border border-outline-variant/50 rounded-lg px-4 py-2.5 focus:ring-2 focus:ring-primary/10 focus:border-primary transition-all font-medium text-sm" id="confirm-password" placeholder="••••••••" type="password"/>
</div>
</div>
</div>
</section>
<hr class="border-outline-variant/30"/>
<!-- Agent Configuration Section -->
<section class="space-y-4">
<div class="flex items-center gap-2 mb-2">
<span class="material-symbols-outlined text-primary/70 text-lg" data-icon="smart_toy">smart_toy</span>
<h2 class="font-headline font-bold text-on-surface-variant text-xs uppercase tracking-[0.15em]">Primary Agent</h2>
</div>
<div class="space-y-4">
<div class="grid gap-1.5">
<label class="text-xs font-bold text-on-surface-variant/80 px-1" for="agent-name">Primary Agent Name</label>
<input class="w-full bg-surface-container-low border border-outline-variant/50 rounded-lg px-4 py-2.5 focus:ring-2 focus:ring-primary/10 focus:border-primary placeholder:text-outline/70 transition-all font-medium text-sm" id="agent-name" placeholder="Assistant" type="text"/>
</div>
<div class="grid gap-1.5">
<label class="text-xs font-bold text-on-surface-variant/80 px-1" for="system-prompt">Primary Agent System Prompt</label>
<textarea class="w-full bg-surface-container-low border border-outline-variant/50 rounded-lg px-4 py-3 focus:ring-2 focus:ring-primary/10 focus:border-primary placeholder:text-outline/70 transition-all font-medium text-sm min-h-[120px] resize-none leading-relaxed" id="system-prompt" placeholder="You are a technical research assistant..."></textarea>
</div>
</div>
</section>
<!-- Action Footer -->
<div class="pt-2">
<button class="w-full px-8 py-3.5 bg-primary text-on-primary font-headline font-bold rounded-lg hover:bg-primary-dim transition-all scale-98-active flex items-center justify-center gap-2 text-base shadow-sm" type="submit">
                    Create Workspace
                    <span class="material-symbols-outlined text-xl" data-icon="arrow_forward">arrow_forward</span>
</button>
<p class="mt-4 text-center text-[10px] text-on-surface-variant/60 uppercase tracking-[0.2em] font-bold">
                    Ready to launch local environment
                </p>
</div>
</form>
</div>
<!-- Footer Meta -->
<footer class="mt-12 text-center text-on-surface-variant/50 text-xs font-medium">
<p>NextGenChat • Local Development Node • v1.0.0</p>
</footer>
</div>
</main>
<!-- Visual Decorative Elements -->
<div class="fixed top-0 left-0 w-full h-full pointer-events-none -z-10 overflow-hidden">
<div class="absolute top-0 right-0 w-[40rem] h-[40rem] bg-primary/[0.02] rounded-full blur-[100px]"></div>
<div class="absolute bottom-0 left-0 w-[30rem] h-[30rem] bg-primary/[0.01] rounded-full blur-[80px]"></div>
</div>
</body></html>
