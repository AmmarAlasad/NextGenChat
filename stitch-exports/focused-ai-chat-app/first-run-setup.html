<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "on-primary-fixed": "#2c3885",
                    "surface-tint": "#4c58a6",
                    "on-tertiary": "#f8f8ff",
                    "on-tertiary-fixed": "#303c53",
                    "tertiary": "#535f78",
                    "error-container": "#ff8b9a",
                    "secondary": "#546073",
                    "on-error": "#fff7f7",
                    "on-tertiary-container": "#434e66",
                    "on-background": "#2a3439",
                    "secondary-container": "#d8e3fa",
                    "tertiary-fixed": "#d1ddfa",
                    "primary-dim": "#404c99",
                    "on-tertiary-fixed-variant": "#4c5870",
                    "tertiary-dim": "#47536b",
                    "inverse-primary": "#9ca8fd",
                    "inverse-on-surface": "#9a9d9f",
                    "on-primary-container": "#3f4b98",
                    "on-secondary": "#f8f8ff",
                    "error": "#9e3f4e",
                    "primary-fixed": "#dfe0ff",
                    "primary-container": "#dfe0ff",
                    "on-secondary-fixed": "#354052",
                    "on-surface-variant": "#566166",
                    "on-primary-fixed-variant": "#4955a3",
                    "surface-variant": "#d9e4ea",
                    "on-primary": "#f9f6ff",
                    "secondary-fixed": "#d8e3fa",
                    "surface-container-lowest": "#ffffff",
                    "error-dim": "#4f0116",
                    "surface-container-high": "#e1e9ee",
                    "primary": "#4c58a6",
                    "inverse-surface": "#0b0f10",
                    "secondary-fixed-dim": "#cad5ec",
                    "secondary-dim": "#495467",
                    "surface-container": "#e8eff3",
                    "tertiary-container": "#d1ddfa",
                    "background": "#f7f9fb",
                    "outline-variant": "#a9b4b9",
                    "surface-dim": "#cfdce3",
                    "on-surface": "#2a3439",
                    "on-secondary-fixed-variant": "#515c6f",
                    "tertiary-fixed-dim": "#c3cfeb",
                    "on-secondary-container": "#475265",
                    "on-error-container": "#782232",
                    "outline": "#717c82",
                    "surface-bright": "#f7f9fb",
                    "surface-container-low": "#f0f4f7",
                    "surface": "#f7f9fb",
                    "surface-container-highest": "#d9e4ea",
                    "primary-fixed-dim": "#cdd1ff"
            },
            "borderRadius": {
                    "DEFAULT": "0.5rem",
                    "lg": "1rem",
                    "xl": "1.5rem",
                    "full": "9999px"
            },
            "fontFamily": {
                    "headline": ["Manrope"],
                    "body": ["Inter"],
                    "label": ["Inter"]
            }
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            vertical-align: middle;
        }
        .scale-98-active:active { transform: scale(0.98); }
    </style>
</head>
<body class="bg-background text-on-background font-body selection:bg-primary-container selection:text-on-primary-container">
<main class="min-h-screen flex items-center justify-center p-6 sm:p-12">
<div class="w-full max-w-xl">
<!-- Header Section -->
<header class="text-center mb-10">
<div class="inline-flex items-center justify-center p-3 rounded-xl bg-surface-container-high mb-6">
<span class="material-symbols-outlined text-primary text-3xl" data-icon="terminal">terminal</span>
</div>
<h1 class="font-headline font-extrabold text-3xl tracking-tight text-on-surface mb-3">NextGenChat</h1>
<p class="text-on-surface-variant font-medium text-base max-w-sm mx-auto leading-relaxed">
                NextGenChat is a local-first AI workspace. Your data and conversations stay on your machine.
            </p>
</header>
<!-- Configuration Card -->
<div class="bg-surface-container-lowest rounded-xl p-8 sm:p-10 shadow-[0_8px_30px_rgba(42,52,57,0.04)] border border-outline-variant/30 relative overflow-hidden">
<div class="absolute top-0 left-0 right-0 h-1 bg-gradient-to-r from-primary to-primary-dim"></div>
<form class="space-y-8">
<!-- User Credentials Section -->
<section class="space-y-4">
<div class="flex items-center gap-2 mb-2">
<span class="material-symbols-outlined text-on-surface-variant text-lg" data-icon="account_circle">account_circle</span>
<h2 class="font-headline font-bold text-on-surface text-sm uppercase tracking-wider">User Account</h2>
</div>
<div class="space-y-4">
<div class="grid gap-1.5">
<label class="text-xs font-semibold text-on-surface-variant px-1" for="username">Username</label>
<input class="w-full bg-surface-container-low border border-outline-variant/30 rounded-lg px-4 py-2.5 focus:ring-2 focus:ring-primary/20 focus:border-primary placeholder:text-outline transition-all font-medium text-sm" id="username" placeholder="curator_01" type="text"/>
</div>
<div class="grid sm:grid-cols-2 gap-4">
<div class="grid gap-1.5">
<label class="text-xs font-semibold text-on-surface-variant px-1" for="password">Password</label>
<input class="w-full bg-surface-container-low border border-outline-variant/30 rounded-lg px-4 py-2.5 focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all font-medium text-sm" id="password" placeholder="••••••••" type="password"/>
</div>
<div class="grid gap-1.5">
<label class="text-xs font-semibold text-on-surface-variant px-1" for="confirm-password">Confirm Password</label>
<input class="w-full bg-surface-container-low border border-outline-variant/30 rounded-lg px-4 py-2.5 focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all font-medium text-sm" id="confirm-password" placeholder="••••••••" type="password"/>
</div>
</div>
</div>
</section>
<hr class="border-outline-variant/20"/>
<!-- Agent Configuration Section -->
<section class="space-y-4">
<div class="flex items-center gap-2 mb-2">
<span class="material-symbols-outlined text-on-surface-variant text-lg" data-icon="smart_toy">smart_toy</span>
<h2 class="font-headline font-bold text-on-surface text-sm uppercase tracking-wider">Primary Agent</h2>
</div>
<div class="space-y-4">
<div class="grid gap-1.5">
<label class="text-xs font-semibold text-on-surface-variant px-1" for="agent-name">Primary Agent Name</label>
<input class="w-full bg-surface-container-low border border-outline-variant/30 rounded-lg px-4 py-2.5 focus:ring-2 focus:ring-primary/20 focus:border-primary placeholder:text-outline transition-all font-medium text-sm" id="agent-name" placeholder="Assistant" type="text"/>
</div>
<div class="grid gap-1.5">
<label class="text-xs font-semibold text-on-surface-variant px-1" for="system-prompt">Primary Agent System Prompt</label>
<textarea class="w-full bg-surface-container-low border border-outline-variant/30 rounded-lg px-4 py-3 focus:ring-2 focus:ring-primary/20 focus:border-primary placeholder:text-outline transition-all font-medium text-sm min-h-[120px] resize-none" id="system-prompt" placeholder="You are a technical research assistant..."></textarea>
</div>
</div>
</section>
<!-- Action Footer -->
<div class="pt-2">
<button class="w-full px-8 py-3.5 bg-primary text-on-primary font-headline font-bold rounded-lg shadow-lg shadow-primary/20 hover:bg-primary-dim transition-all scale-98-active flex items-center justify-center gap-2 text-base" type="submit">
                        Create Workspace
                        <span class="material-symbols-outlined text-xl" data-icon="arrow_forward">arrow_forward</span>
</button>
<p class="mt-4 text-center text-[11px] text-on-surface-variant/70 uppercase tracking-widest font-semibold">
                        Ready to launch local environment
                    </p>
</div>
</form>
</div>
<!-- Footer Meta -->
<footer class="mt-12 text-center text-on-surface-variant text-xs font-medium opacity-60">
<p>NextGenChat • Local Development Node • v1.0.0</p>
</footer>
</div>
</main>
<!-- Visual Decorative Elements -->
<div class="fixed top-0 left-0 w-full h-full pointer-events-none -z-10 overflow-hidden">
<div class="absolute -top-24 -left-24 w-96 h-96 bg-primary/5 rounded-full blur-3xl"></div>
<div class="absolute top-1/2 -right-48 w-[32rem] h-[32rem] bg-secondary-container/10 rounded-full blur-[100px]"></div>
</div>
</body></html>
