# Continuous integration scaffold.
# Validates install, lint, type-check, tests, and Prisma schema health on pushes and PRs.
# Future changes should extend this workflow rather than replacing its baseline checks.

name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Type-check
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Prisma schema validation
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/nextgenchat?schema=public
        run: pnpm --filter @nextgenchat/backend prisma:validate
